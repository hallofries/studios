<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>hallofries studios</title>
    <link rel="stylesheet" href="index.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="image/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="image/favicon-32x32.png"
    />
    <link rel="icon" type="image/x-icon" href="image/favicon.ico" />
    <link rel="apple-touch-icon" href="image/apple-touch-icon.png" />
    <link rel="manifest" href="image/site.webmanifest" />
    <link rel="preload" href="image/favicon.ico" as="image" />

    <meta property="og:title" content="hallofries studios" />
    <meta property="og:description" content="moo!" />
    <meta
      property="og:image"
      content="https://hallofries.github.io/studios/image/home.png"
    />
    <meta
      property="og:url"
      content="https://hallofries.github.io/studios/index.html"
    />
    <meta property="og:type" content="website" />
  </head>

  <script
    data-goatcounter="https://hallofries.goatcounter.com/count"
    async
    src="//gc.zgo.at/count.js"
  ></script>

  <body>
    <!-- Fixed bg image (viewport-sized, no body-height upscaling) -->
    <div class="bg-image"></div>

    <input type="checkbox" id="menu-toggle" />
    <label class="toggle-button" for="menu-toggle">
      <img src="image/menu2.png" alt="Menu" />
    </label>

    <div class="overlay"></div>

    <!-- Desktop layers -->
    <div class="land"></div>
    <div class="hill2"></div>
    <div class="moon" id="moon"></div>

    <!-- Mobile-only layers -->
    <div class="big-field"></div>
    <div class="field-left"></div>
    <div class="field-right"></div>

    <!-- Clickable UFO sitting at the bottom of the page (triggers the abduction sequence) -->
    <img
      class="ufo-trigger"
      id="ufoTrigger"
      src="image/ufo-2.png"
      alt="Click the UFO"
    />

    <!-- UFO abduction (descending UFO + beam) -->
    <img class="ufo" src="image/ufo-new.png" alt="UFO" />
    <div class="ufo-beam"></div>

    <!-- Menu items -->
    <div class="menu-item" id="home">
      <a href="index.html"><img src="image/home.png" alt="Home" /></a>
    </div>
    <div class="menu-item" id="about">
      <a href="aboutme.html"><img src="image/about.png" alt="About" /></a>
    </div>
    <div class="menu-item" id="portfolio">
      <a href="portf.html"><img src="image/portfolio.png" alt="Portfolio" /></a>
    </div>
    <div class="menu-item" id="contact">
      <a href="contactme.html"><img src="image/contact.png" alt="Contact" /></a>
    </div>

    <!-- Audio (HTML5 audio elements — reliable playback) -->
    <audio id="backgroundMusic" loop preload="metadata">
      <source src="image/night ambiance.mp3" type="audio/mpeg" />
    </audio>

    <audio id="scrollSound" preload="metadata">
      <source src="image/spooky theremin.mp3" type="audio/mpeg" />
    </audio>

    <img src="image/musicnote.png" alt="Volume Button" id="volumeButton" />

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const backgroundMusic = document.getElementById("backgroundMusic");
        const scrollSound = document.getElementById("scrollSound");
        const volumeButton = document.getElementById("volumeButton");
        const moon = document.getElementById("moon");
        const ufoTrigger = document.getElementById("ufoTrigger");

        let isMuted = false;
        let hasPlayedScrollSound = false;
        let ufoTriggered = false;
        let shouldResumeMusic = false;

        const isMobile = () => window.matchMedia("(max-width: 768px)").matches;

        // ============ MEDIA SESSION SUPPRESSION ============
        function suppressMediaSession() {
          if (!("mediaSession" in navigator)) return;

          try {
            navigator.mediaSession.metadata = null;
            navigator.mediaSession.playbackState = "none";

            [
              "play",
              "pause",
              "previoustrack",
              "nexttrack",
              "seekbackward",
              "seekforward",
              "seekto",
              "stop",
            ].forEach((action) => {
              try {
                navigator.mediaSession.setActionHandler(action, null);
              } catch (e) {}
            });
          } catch (e) {}
        }

        try {
          backgroundMusic.disableRemotePlayback = true;
          scrollSound.disableRemotePlayback = true;
        } catch (e) {}

        // ============ SCROLL SOUND HELPER ============
        function playScrollSoundOnce() {
          if (isMuted || hasPlayedScrollSound) return;

          scrollSound.currentTime = 0;
          scrollSound.volume = 0.2;

          scrollSound
            .play()
            .then(() => suppressMediaSession())
            .catch((err) => console.warn("Scroll sound blocked:", err));

          hasPlayedScrollSound = true;

          scrollSound.onended = () => {
            hasPlayedScrollSound = false;
          };
        }

        // ============ START BG MUSIC ON FIRST INTERACTION ============
        function startMusic() {
          backgroundMusic.volume = 0.4;
          backgroundMusic.loop = true;

          backgroundMusic
            .play()
            .then(() => {
              suppressMediaSession();
            })
            .catch((err) => console.warn("Autoplay blocked:", err));
        }

        const tryStartMusic = () => {
          startMusic();
          document.removeEventListener("click", tryStartMusic, true);
          document.removeEventListener("touchstart", tryStartMusic, true);
        };

        document.addEventListener("click", tryStartMusic, true);
        document.addEventListener("touchstart", tryStartMusic, true);

        // ============ PAUSE AUDIO WHEN USER LEAVES / LOCKS PAGE ============
        function pausePageAudio() {
          // Remember if the background ambience was playing before pausing.
          shouldResumeMusic = !backgroundMusic.paused && !isMuted;

          backgroundMusic.pause();

          // Stop one-shot sounds too, so they do not continue after leaving/locking.
          scrollSound.pause();
          scrollSound.currentTime = 0;
          hasPlayedScrollSound = false;

          suppressMediaSession();
        }

        function resumePageAudio() {
          // Only resume if it had already been playing before the page was hidden.
          if (!shouldResumeMusic || isMuted) return;

          backgroundMusic
            .play()
            .then(() => suppressMediaSession())
            .catch((err) => console.warn("Resume blocked:", err));

          shouldResumeMusic = false;
        }

        document.addEventListener("visibilitychange", () => {
          if (document.hidden) {
            pausePageAudio();
          } else {
            resumePageAudio();
          }
        });

        // Extra safety for iOS Safari / app switching / locking behavior.
        window.addEventListener("pagehide", pausePageAudio);
        window.addEventListener("blur", pausePageAudio);

        window.addEventListener("pageshow", () => {
          if (!document.hidden) resumePageAudio();
        });

        window.addEventListener("focus", () => {
          if (!document.hidden) resumePageAudio();
        });

        // ============ SCROLL (rAF-throttled + scroll sound on desktop + UFO visibility) ============
        let scrollScheduled = false;

        window.addEventListener("scroll", () => {
          if (scrollScheduled) return;

          scrollScheduled = true;

          requestAnimationFrame(() => {
            const scrollPos =
              window.scrollY / document.documentElement.scrollHeight;

            document.body.style.setProperty("--scroll-position", scrollPos);

            // Scroll sound on scroll — DESKTOP ONLY.
            // Mobile triggers it from the UFO click handler instead.
            if (!isMobile()) {
              playScrollSoundOnce();
            }

            // UFO trigger fade-in when near bottom of scroll
            if (ufoTrigger && !ufoTriggered) {
              const maxScroll =
                document.documentElement.scrollHeight - window.innerHeight;

              if (window.scrollY >= maxScroll - 50) {
                ufoTrigger.classList.add("visible");
              } else {
                ufoTrigger.classList.remove("visible");
              }
            }

            scrollScheduled = false;
          });
        });

        // ============ UFO TRIGGER CLICK ============
        if (ufoTrigger) {
          ufoTrigger.addEventListener("click", (e) => {
            e.stopPropagation();

            if (ufoTriggered) return;

            ufoTriggered = true;

            // On mobile, the spooky theremin plays here (when UFO is tapped)
            // instead of on scroll.
            if (isMobile()) {
              playScrollSoundOnce();
            }

            ufoTrigger.classList.add("fading");

            setTimeout(() => {
              document.body.classList.add("ufo-launch");

              setTimeout(() => {
                window.location.href = "map.html";
              }, 7000);
            }, 1000);
          });
        }

        // ============ VOLUME BUTTON ============
        volumeButton.addEventListener("click", () => {
          isMuted = !isMuted;

          backgroundMusic.muted = isMuted;
          scrollSound.muted = isMuted;

          volumeButton.src = isMuted
            ? "image/musicnote-muted.png"
            : "image/musicnote.png";

          volumeButton.classList.add("clicked");

          setTimeout(() => volumeButton.classList.remove("clicked"), 700);
        });

        // ============ MOON CLICK ============
        if (moon) {
          moon.addEventListener("click", (e) => {
            e.stopPropagation();
            window.location.href = "map.html";
          });
        }

        // ============ IMAGE PROTECTION ============
        document.addEventListener("contextmenu", (e) => e.preventDefault());

        document.addEventListener("dragstart", (e) => {
          if (e.target.tagName === "IMG") e.preventDefault();
        });
      });
    </script>
  </body>
</html>
