<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3d5a2a" />
    <title>hallofries studios</title>
    <link rel="stylesheet" href="index.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="image/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="image/favicon-32x32.png"
    />
    <link rel="icon" type="image/x-icon" href="image/favicon.ico" />
    <link rel="apple-touch-icon" href="image/apple-touch-icon.png" />
    <link rel="manifest" href="image/site.webmanifest" />
    <link rel="preload" href="image/favicon.ico" as="image" />

    <meta property="og:title" content="hallofries studios" />
    <meta property="og:description" content="moo!" />
    <meta
      property="og:image"
      content="https://hallofries.github.io/studios/image/home.png"
    />
    <meta
      property="og:url"
      content="https://hallofries.github.io/studios/index.html"
    />
    <meta property="og:type" content="website" />
  </head>
  <script
    data-goatcounter="https://hallofries.goatcounter.com/count"
    async
    src="//gc.zgo.at/count.js"
  ></script>
  <body>
    <input type="checkbox" id="menu-toggle" />
    <label class="toggle-button" for="menu-toggle">
      <img src="image/menu2.png" alt="Menu" />
    </label>

    <div class="overlay"></div>

    <!-- Desktop layers -->
    <div class="land"></div>
    <div class="hill2"></div>
    <div class="moon" id="moon"></div>

    <!-- Mobile-only layers -->
    <div class="big-field"></div>
    <div class="field-left"></div>
    <div class="field-right"></div>

    <!-- Clickable UFO sitting at the bottom of the page (triggers the abduction sequence) -->
    <img
      class="ufo-trigger"
      id="ufoTrigger"
      src="image/ufo-2.png"
      alt="Click the UFO"
    />

    <!-- UFO abduction (descending UFO + beam) -->
    <img class="ufo" src="image/ufo-new.png" alt="UFO" />
    <div class="ufo-beam"></div>

    <!-- Menu items -->
    <div class="menu-item" id="home">
      <a href="index.html"><img src="image/home.png" alt="Home" /></a>
    </div>
    <div class="menu-item" id="about">
      <a href="aboutme.html"><img src="image/about.png" alt="About" /></a>
    </div>
    <div class="menu-item" id="portfolio">
      <a href="portf.html"><img src="image/portfolio.png" alt="Portfolio" /></a>
    </div>
    <div class="menu-item" id="contact">
      <a href="contactme.html"><img src="image/contact.png" alt="Contact" /></a>
    </div>

    <img src="image/musicnote.png" alt="Volume Button" id="volumeButton" />

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const volumeButton = document.getElementById("volumeButton");
        const moon = document.getElementById("moon");
        const ufoTrigger = document.getElementById("ufoTrigger");
        let isMuted = false;
        let hasPlayedScrollSound = false;
        let ufoTriggered = false;

        // ============ AUDIO (Web Audio API — no lock screen indicator) ============
        let audioContext = null;
        let bgMusicBuffer = null;
        let scrollSoundBuffer = null;
        let bgMusicSource = null;
        let bgGainNode = null;
        let scrollGainNode = null;
        let bgPlaying = false;

        async function initAudio() {
          try {
            audioContext = new (
              window.AudioContext || window.webkitAudioContext
            )();

            bgGainNode = audioContext.createGain();
            bgGainNode.gain.value = 0.4;
            bgGainNode.connect(audioContext.destination);

            scrollGainNode = audioContext.createGain();
            scrollGainNode.gain.value = 0.2;
            scrollGainNode.connect(audioContext.destination);

            const [bgRes, scrollRes] = await Promise.all([
              fetch("image/night ambiance.mp3"),
              fetch("image/spooky theremin.mp3"),
            ]);

            const [bgArr, scrollArr] = await Promise.all([
              bgRes.arrayBuffer(),
              scrollRes.arrayBuffer(),
            ]);

            [bgMusicBuffer, scrollSoundBuffer] = await Promise.all([
              audioContext.decodeAudioData(bgArr),
              audioContext.decodeAudioData(scrollArr),
            ]);
          } catch (err) {
            console.warn("Audio init failed:", err);
          }
        }

        async function startBgMusic() {
          if (!audioContext || bgPlaying || !bgMusicBuffer) return;
          try {
            if (audioContext.state === "suspended") {
              await audioContext.resume();
            }
            bgMusicSource = audioContext.createBufferSource();
            bgMusicSource.buffer = bgMusicBuffer;
            bgMusicSource.loop = true;
            bgMusicSource.connect(bgGainNode);
            bgMusicSource.start();
            bgPlaying = true;
          } catch (err) {
            console.warn("BG music failed:", err);
          }
        }

        function playScrollSound() {
          if (!audioContext || !scrollSoundBuffer) return;
          try {
            const source = audioContext.createBufferSource();
            source.buffer = scrollSoundBuffer;
            source.connect(scrollGainNode);
            source.onended = () => {
              hasPlayedScrollSound = false;
            };
            source.start();
            hasPlayedScrollSound = true;
          } catch (err) {
            console.warn("Scroll sound failed:", err);
          }
        }

        function toggleMute() {
          isMuted = !isMuted;
          if (bgGainNode) bgGainNode.gain.value = isMuted ? 0 : 0.4;
          if (scrollGainNode) scrollGainNode.gain.value = isMuted ? 0 : 0.2;
        }

        initAudio();

        document.body.addEventListener(
          "click",
          () => {
            startBgMusic();
          },
          { once: true },
        );

        // ============ SCROLL (rAF-throttled for smoother mobile parallax) ============
        let scrollScheduled = false;

        window.addEventListener("scroll", () => {
          if (scrollScheduled) return;
          scrollScheduled = true;
          requestAnimationFrame(() => {
            const scrollPos =
              window.scrollY / document.documentElement.scrollHeight;
            document.body.style.setProperty("--scroll-position", scrollPos);

            if (!isMuted && !hasPlayedScrollSound) {
              playScrollSound();
            }

            if (ufoTrigger && !ufoTriggered) {
              const maxScroll =
                document.documentElement.scrollHeight - window.innerHeight;
              if (window.scrollY >= maxScroll - 50) {
                ufoTrigger.classList.add("visible");
              } else {
                ufoTrigger.classList.remove("visible");
              }
            }

            scrollScheduled = false;
          });
        });

        // ============ UFO TRIGGER CLICK ============
        if (ufoTrigger) {
          ufoTrigger.addEventListener("click", (e) => {
            e.stopPropagation();
            if (ufoTriggered) return;
            ufoTriggered = true;

            ufoTrigger.classList.add("fading");

            setTimeout(() => {
              document.body.classList.add("ufo-launch");
              setTimeout(() => {
                window.location.href = "aboutme.html";
              }, 7000);
            }, 1000);
          });
        }

        // ============ VOLUME BUTTON ============
        volumeButton.addEventListener("click", () => {
          toggleMute();
          volumeButton.src = isMuted
            ? "image/musicnote-muted.png"
            : "image/musicnote.png";

          volumeButton.classList.add("clicked");
          setTimeout(() => volumeButton.classList.remove("clicked"), 700);
        });

        // ============ MOON CLICK ============
        if (moon) {
          moon.addEventListener("click", (e) => {
            e.stopPropagation();
            window.location.href = "moon.html";
          });
        }

        // ============ IMAGE PROTECTION (no right-click, no drag, no long-press save) ============
        document.addEventListener("contextmenu", (e) => e.preventDefault());
        document.addEventListener("dragstart", (e) => {
          if (e.target.tagName === "IMG") e.preventDefault();
        });
      });
    </script>
  </body>
</html>
